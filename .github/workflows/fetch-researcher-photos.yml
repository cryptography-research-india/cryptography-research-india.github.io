name: Fetch Researcher Photos

on:
  workflow_dispatch:   # run manually from Actions tab whenever you want to refresh

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 pillow pyyaml ruamel.yaml opencv-python-headless numpy

      - name: Fetch photos
        id: fetch
        run: |
          python .github/scripts/fetch_photos.py
          echo "changed=$(git status --porcelain | grep -c '' || true)" >> $GITHUB_OUTPUT

      - name: Create PR with fetched photos
        if: steps.fetch.outputs.changed != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            execSync('git config user.name  "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');

            const branch = `bot/researcher-photos-${Date.now()}`;
            execSync(`git checkout -b ${branch}`);
            execSync('git add assets/images/people/ _data/names-people.yml');
            execSync('git commit -m "Add researcher profile photos"');
            execSync(`git push origin ${branch}`);

            // Count how many photos were added
            const diff = execSync('git diff HEAD~1 --name-only').toString();
            const photos = diff.split('\n').filter(f => f.startsWith('assets/images/people/') && f.endsWith('.jpg'));

            const pr = await github.rest.pulls.create({
              ...context.repo,
              title: `Add researcher profile photos (${photos.length} found)`,
              body: [
                '## Researcher photos fetched automatically',
                '',
                `Found and saved **${photos.length}** profile photos from researcher webpages.`,
                '',
                '### Photos added',
                photos.map(f => `- \`${f}\``).join('\n'),
                '',
                '### Before merging',
                '- [ ] Spot-check a few photos — make sure they are actually the right person',
                '- [ ] Remove any that look wrong (delete the file and remove the `photo:` field from `_data/names-people.yml`)',
                '',
                '*Generated by the Fetch Researcher Photos workflow.*',
              ].join('\n'),
              head: branch,
              base: 'master',
            });

            console.log('PR created:', pr.data.html_url);

      - name: No photos found
        if: steps.fetch.outputs.changed == '0'
        run: echo "No new photos were found — nothing to commit."
