name: Process Submissions

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ── Add Researcher ──────────────────────────────────────────────────────────
  add-researcher:
    if: contains(github.event.issue.labels.*.name, 'add-researcher')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Parse issue and create researcher PR
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body  = issue.body || '';

            // Parse GitHub issue form fields
            function field(label) {
              const re = new RegExp(`### ${label}\\s*\\n+([\\s\\S]*?)(?=\\n### |$)`, 'i');
              const m  = body.match(re);
              return m ? m[1].trim() : '';
            }

            const name        = field('Full Name');
            const designation = field('Designation');
            const affiliation = field('Affiliation');
            const rawAreas    = field('Research Areas');
            const webpage     = field('Personal Webpage URL');
            const lab         = field('Lab / Group URL \\(optional\\)');
            const sector      = field('Sector');
            const location    = field('Currently based in');

            if (!name || !designation || !affiliation) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: '❌ Could not parse required fields. Please ensure Name, Designation, and Affiliation are filled in.',
              });
              return;
            }

            // Build tags
            const tags = [];
            if (sector === 'Academia')  tags.push('ACADEMIA');
            if (sector === 'Industry')  tags.push('INDUSTRY');
            if (location === 'India')   tags.push('WORKING_IN_INDIA');
            if (location === 'Abroad')  tags.push('WORKING_ABROAD');

            const researchAreas = rawAreas.split('\n')
              .map(l => l.replace(/^[-*]\s*/, '').trim())
              .filter(Boolean);

            // Build YAML entry
            let yaml = `- name: ${name}\n  designation: ${designation}\n  affiliation: ${affiliation}\n`;
            if (webpage && webpage !== '_No response_') yaml += `  webpage: ${webpage}\n`;
            if (lab && lab !== '_No response_')         yaml += `  lab: ${lab}\n`;
            if (researchAreas.length) {
              yaml += `  research_areas:\n`;
              researchAreas.forEach(a => { yaml += `    - ${a}\n`; });
            }
            yaml += `  tags: [${tags.join(', ')}]\n`;

            // Read existing file and append
            const { data: fileData } = await github.rest.repos.getContent({
              ...context.repo,
              path: '_data/names-people.yml',
              ref: 'master',
            });
            const existing = Buffer.from(fileData.content, 'base64').toString('utf8');
            const newContent = existing.trimEnd() + '\n\n' + yaml;

            // Create branch and commit
            const branch = `submission/researcher-${issue.number}`;
            const { data: ref } = await github.rest.git.getRef({ ...context.repo, ref: 'heads/master' });
            await github.rest.git.createRef({ ...context.repo, ref: `refs/heads/${branch}`, sha: ref.object.sha });
            await github.rest.repos.createOrUpdateFileContents({
              ...context.repo,
              path: '_data/names-people.yml',
              message: `Add researcher: ${name}`,
              content: Buffer.from(newContent).toString('base64'),
              sha: fileData.sha,
              branch,
            });

            // Open PR
            const pr = await github.rest.pulls.create({
              ...context.repo,
              title: `Add researcher: ${name}`,
              body: `Submitted via [Issue #${issue.number}](${issue.html_url}) by @${issue.user.login}.\n\n**Entry preview:**\n\`\`\`yaml\n${yaml}\`\`\`\n\n### Checklist\n- [ ] Name and affiliation are correct\n- [ ] Research areas are accurate\n- [ ] Tags are appropriate`,
              head: branch,
              base: 'master',
            });

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body: `✅ Thanks! A PR has been created for review: ${pr.data.html_url}\n\nA maintainer will review and merge it shortly.`,
            });

  # ── Add Position ───────────────────────────────────────────────────────────
  add-position:
    if: contains(github.event.issue.labels.*.name, 'add-position')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Parse issue and create position PR
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body  = issue.body || '';

            function field(label) {
              const re = new RegExp(`### ${label}\\s*\\n+([\\s\\S]*?)(?=\\n### |$)`, 'i');
              const m  = body.match(re);
              return m ? m[1].trim() : '';
            }

            const title       = field('Position Title');
            const org         = field('Organization / Institution');
            const type        = field('Position Type');
            const location    = field('Location');
            const deadline    = field('Application Deadline');
            const link        = field('Application / Details URL');
            const description = field('Brief Description');
            const contact     = field('Contact Email \\(optional\\)');

            if (!title || !org || !link) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: '❌ Could not parse required fields. Please ensure Title, Organization, and URL are filled in.',
              });
              return;
            }

            const date = new Date().toISOString().split('T')[0];
            const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
            const filename = `_positions/${date}-${slug}.md`;

            const content = `---\ntitle: "${title}"\norganization: "${org}"\ntype: "${type}"\nlocation: "${location}"\ndeadline: "${deadline}"\nlink: "${link}"\n${contact && contact !== '_No response_' ? `contact: "${contact}"\n` : ''}date: ${date}\n---\n\n${description}\n`;

            // Create branch and commit
            const branch = `submission/position-${issue.number}`;
            const { data: ref } = await github.rest.git.getRef({ ...context.repo, ref: 'heads/master' });
            await github.rest.git.createRef({ ...context.repo, ref: `refs/heads/${branch}`, sha: ref.object.sha });

            // Create _positions dir with the new file
            await github.rest.repos.createOrUpdateFileContents({
              ...context.repo,
              path: filename,
              message: `Add position: ${title}`,
              content: Buffer.from(content).toString('base64'),
              branch,
            });

            const pr = await github.rest.pulls.create({
              ...context.repo,
              title: `Add position: ${title} at ${org}`,
              body: `Submitted via [Issue #${issue.number}](${issue.html_url}) by @${issue.user.login}.\n\n**Deadline:** ${deadline}\n**Link:** ${link}\n\n### Checklist\n- [ ] Title and org are correct\n- [ ] Deadline is accurate\n- [ ] Link is working`,
              head: branch,
              base: 'master',
            });

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body: `✅ Position submitted! PR for review: ${pr.data.html_url}`,
            });

  # ── Submit Blog Post ────────────────────────────────────────────────────────
  submit-blogpost:
    if: contains(github.event.issue.labels.*.name, 'submit-blogpost')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Parse issue and create blog post PR
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body  = issue.body || '';

            function field(label) {
              const re = new RegExp(`### ${label}\\s*\\n+([\\s\\S]*?)(?=\\n### |$)`, 'i');
              const m  = body.match(re);
              return m ? m[1].trim() : '';
            }

            const title    = field('Post Title');
            const author   = field('Your Name');
            const category = field('Category');
            const rawTags  = field('Tags');
            const excerpt  = field('Short Excerpt \\(1–2 sentences\\)');
            const content  = field('Post Content \\(Markdown\\)');

            if (!title || !author || !content) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: '❌ Missing required fields. Please provide Title, Author, and Content.',
              });
              return;
            }

            const date = new Date().toISOString().split('T')[0];
            const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
            const filename = `_posts/${date}-${slug}.md`;

            const tags = rawTags && rawTags !== '_No response_'
              ? rawTags.split(',').map(t => t.trim()).filter(Boolean)
              : [];

            const frontmatter = [
              '---',
              `title: "${title}"`,
              `author: "${author}"`,
              `date: ${date}`,
              `categories: ["${category}"]`,
              tags.length ? `tags: [${tags.map(t => `"${t}"`).join(', ')}]` : '',
              excerpt ? `excerpt: "${excerpt.replace(/"/g, '\\"')}"` : '',
              '---',
            ].filter(Boolean).join('\n');

            const postContent = `${frontmatter}\n\n${content}\n`;

            const branch = `submission/blogpost-${issue.number}`;
            const { data: ref } = await github.rest.git.getRef({ ...context.repo, ref: 'heads/master' });
            await github.rest.git.createRef({ ...context.repo, ref: `refs/heads/${branch}`, sha: ref.object.sha });

            await github.rest.repos.createOrUpdateFileContents({
              ...context.repo,
              path: filename,
              message: `Add post: ${title}`,
              content: Buffer.from(postContent).toString('base64'),
              branch,
            });

            const pr = await github.rest.pulls.create({
              ...context.repo,
              title: `Post: ${title}`,
              body: `Submitted via [Issue #${issue.number}](${issue.html_url}) by @${issue.user.login}.\n\n**Author:** ${author}\n**Category:** ${category}\n\n### Checklist\n- [ ] Content is appropriate and well-formatted\n- [ ] Markdown renders correctly\n- [ ] Author name is correct`,
              head: branch,
              base: 'master',
            });

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body: `✅ Blog post submitted! PR for review: ${pr.data.html_url}\n\nA maintainer will review your post and merge it. Thank you for contributing to CRIYPT! 🔐`,
            });

  # ── Collaboration Request ───────────────────────────────────────────────────
  submit-collaboration:
    if: contains(github.event.issue.labels.*.name, 'collaboration-request')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Parse issue and create collaboration PR
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body  = issue.body || '';

            function field(label) {
              const re = new RegExp(`### ${label}\\s*\\n+([\\s\\S]*?)(?=\\n### |$)`, 'i');
              const m  = body.match(re);
              return m ? m[1].trim() : '';
            }

            const name        = field('Your Name');
            const affiliation = field('Affiliation');
            const topic       = field('Collaboration Topic \\(short title\\)');
            const seeking     = field("What are you looking for\\?");
            const description = field('Description');
            const contact     = field('Contact Email');
            const webpage     = field('Personal / Lab Webpage \\(optional\\)');

            if (!name || !topic || !description || !contact) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: '❌ Missing required fields. Please provide Name, Topic, Description, and Contact Email.',
              });
              return;
            }

            // Parse checked research areas from the checkboxes section
            const areasSection = body.match(/### Research Areas\s*\n+([\s\S]*?)(?=\n###|$)/i);
            const areas = [];
            if (areasSection) {
              const lines = areasSection[1].split('\n');
              for (const line of lines) {
                const m = line.match(/^- \[x\] (.+)/i);
                if (m) areas.push(m[1].trim());
              }
            }

            const date = new Date().toISOString().split('T')[0];

            // Build YAML entry
            let yaml = `- name: ${name}\n  affiliation: ${affiliation}\n  topic: "${topic.replace(/"/g, '\\"')}"\n`;
            if (areas.length) {
              yaml += `  areas:\n`;
              areas.forEach(a => { yaml += `    - "${a}"\n`; });
            }
            yaml += `  seeking: "${seeking}"\n`;
            yaml += `  description: "${description.replace(/\n/g, ' ').replace(/"/g, '\\"')}"\n`;
            yaml += `  contact: ${contact}\n`;
            if (webpage && webpage !== '_No response_') yaml += `  webpage: ${webpage}\n`;
            yaml += `  date: ${date}\n`;

            // Read and append to collaborations.yml
            const { data: fileData } = await github.rest.repos.getContent({
              ...context.repo,
              path: '_data/collaborations.yml',
              ref: 'master',
            });
            const existing = Buffer.from(fileData.content, 'base64').toString('utf8');
            const newContent = existing.trimEnd() + '\n\n' + yaml;

            const branch = `submission/collaboration-${issue.number}`;
            const { data: ref } = await github.rest.git.getRef({ ...context.repo, ref: 'heads/master' });
            await github.rest.git.createRef({ ...context.repo, ref: `refs/heads/${branch}`, sha: ref.object.sha });

            await github.rest.repos.createOrUpdateFileContents({
              ...context.repo,
              path: '_data/collaborations.yml',
              message: `Add collaboration: ${topic} (${name})`,
              content: Buffer.from(newContent).toString('base64'),
              sha: fileData.sha,
              branch,
            });

            const pr = await github.rest.pulls.create({
              ...context.repo,
              title: `Collaboration: ${topic}`,
              body: `Submitted via [Issue #${issue.number}](${issue.html_url}) by @${issue.user.login}.\n\n**Posted by:** ${name} (${affiliation})\n**Seeking:** ${seeking}\n\n**Entry preview:**\n\`\`\`yaml\n${yaml}\`\`\`\n\n### Checklist\n- [ ] Description is appropriate\n- [ ] Contact email is correct\n- [ ] Research areas are accurate`,
              head: branch,
              base: 'master',
            });

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body: `✅ Your collaboration post has been submitted for review: ${pr.data.html_url}\n\nOnce merged, it will appear on the [Collaborations page](https://cryptography-research-india.github.io/collaborations/). Thank you for sharing your work with the community! 🤝`,
            });

  # ── Add Resource ─────────────────────────────────────────────────────────────
  add-resource:
    if: contains(github.event.issue.labels.*.name, 'add-resource')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Parse issue and create resource PR
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body  = issue.body || '';

            function field(label) {
              const re = new RegExp(`### ${label}\\s*\\n+([\\s\\S]*?)(?=\\n### |$)`, 'i');
              const m  = body.match(re);
              return m ? m[1].trim() : '';
            }

            const title   = field('Resource Title');
            const url     = field('Resource URL');
            const section = field('Where should this go\\?');
            const why     = field('Why is this useful\\? \\(optional\\)');

            if (!title || !url || !section) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: '❌ Could not parse required fields. Please ensure Title, URL, and Section are filled in.',
              });
              return;
            }

            // Map dropdown choice -> file + anchor comment. Sections not listed
            // here (placeholder topic pages, "Not sure / other") have no
            // structured list yet, so they fall through to a manual-review comment.
            const SECTION_MAP = {
              'Resources page — Textbooks':                                     { file: '_pages/resources.md', anchor: 'Textbooks' },
              'Resources page — Online Courses':                                { file: '_pages/resources.md', anchor: 'Online Courses' },
              'Resources page — Research Groups':                               { file: '_pages/resources.md', anchor: 'Research Groups' },
              'Resources page — Conference Deadlines':                          { file: '_pages/resources.md', anchor: 'Conference Deadlines' },
              'Resources page — Software & Libraries':                          { file: '_pages/resources.md', anchor: 'Software Libraries' },
              'Resources page — Standards':                                     { file: '_pages/resources.md', anchor: 'Standards' },
              'Resources page — Reading Lists':                                 { file: '_pages/resources.md', anchor: 'Reading Lists' },
              'Resources page — Blogs & Newsletters':                           { file: '_pages/resources.md', anchor: 'Blogs & News' },
              'Secure Computation topic page — Courses':                        { file: '_resources/topics/secure-computation.md', anchor: 'Courses' },
              'Secure Computation topic page — Winter Schools & Lecture Series': { file: '_resources/topics/secure-computation.md', anchor: 'Winter Schools & Lecture Series' },
              'Secure Computation topic page — Foundational Papers':            { file: '_resources/topics/secure-computation.md', anchor: 'Foundational Papers' },
              'Secure Computation topic page — Textbooks':                      { file: '_resources/topics/secure-computation.md', anchor: 'Textbooks' },
              'Secure Computation topic page — Frameworks & Libraries':         { file: '_resources/topics/secure-computation.md', anchor: 'Frameworks & Libraries' },
              'Secure Computation topic page — Useful Resources':               { file: '_resources/topics/secure-computation.md', anchor: 'Useful Resources' },
            };

            const target = SECTION_MAP[section];

            if (!target) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: `✅ Thanks for the suggestion! **${title}** (${url}) has been noted for **${section}**. That page doesn't have a curated list yet, so a maintainer will add it by hand once the page is built out.`,
              });
              return;
            }

            const { data: fileData } = await github.rest.repos.getContent({
              ...context.repo,
              path: target.file,
              ref: 'master',
            });
            const existing = Buffer.from(fileData.content, 'base64').toString('utf8');

            const anchor = `<!-- ${target.anchor} -->`;
            const anchorIdx = existing.indexOf(anchor);
            const closeTagIdx = anchorIdx === -1 ? -1 : existing.indexOf('</ul>', anchorIdx);

            if (closeTagIdx === -1) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: `❌ Could not locate the "${section}" section automatically. A maintainer will add this by hand: **${title}** (${url}).`,
              });
              return;
            }

            // Insert at the start of the `</ul>` line so its own indentation
            // stays put and the new <li> gets a clean line of its own.
            const lineStart = existing.lastIndexOf('\n', closeTagIdx) + 1;
            const newLi = `          <li><a href="${url}" target="_blank" rel="noopener">${title}</a></li>\n`;
            const newContent = existing.slice(0, lineStart) + newLi + existing.slice(lineStart);

            const branch = `submission/resource-${issue.number}`;
            const { data: ref } = await github.rest.git.getRef({ ...context.repo, ref: 'heads/master' });
            await github.rest.git.createRef({ ...context.repo, ref: `refs/heads/${branch}`, sha: ref.object.sha });
            await github.rest.repos.createOrUpdateFileContents({
              ...context.repo,
              path: target.file,
              message: `Add resource: ${title}`,
              content: Buffer.from(newContent).toString('base64'),
              sha: fileData.sha,
              branch,
            });

            const pr = await github.rest.pulls.create({
              ...context.repo,
              title: `Add resource: ${title}`,
              body: `Submitted via [Issue #${issue.number}](${issue.html_url}) by @${issue.user.login}.\n\n**Section:** ${section}\n**URL:** ${url}\n${why ? `**Why:** ${why}\n` : ''}\n### Checklist\n- [ ] Link works and matches the title\n- [ ] Belongs in this section\n- [ ] No duplicate already listed`,
              head: branch,
              base: 'master',
            });

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body: `✅ Thanks! A PR has been created for review: ${pr.data.html_url}`,
            });
