name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build Jekyll preview
        run: |
          bundle exec jekyll build \
            --baseurl "/preview/pr-${{ github.event.pull_request.number }}" \
            --destination _site_preview
        env:
          JEKYLL_ENV: production

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-checkout
          fetch-depth: 0
        continue-on-error: true

      - name: Create gh-pages if it does not exist
        run: |
          if [ ! -d "gh-pages-checkout" ]; then
            mkdir gh-pages-checkout
            cd gh-pages-checkout
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git checkout --orphan gh-pages
            git commit --allow-empty -m "Init gh-pages"
          fi

      - name: Copy preview to gh-pages
        run: |
          mkdir -p gh-pages-checkout/preview/pr-${{ github.event.pull_request.number }}
          rsync -a --delete _site_preview/ gh-pages-checkout/preview/pr-${{ github.event.pull_request.number }}/

      - name: Commit and push preview
        run: |
          cd gh-pages-checkout
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add preview/pr-${{ github.event.pull_request.number }}
          git commit -m "Deploy preview for PR #${{ github.event.pull_request.number }}" || echo "Nothing to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = context.payload.pull_request.number;
            const repo = context.repo;
            const previewUrl = `https://${repo.owner}.github.io/${repo.repo}/preview/pr-${prNum}/`;

            // Check for existing preview comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: prNum,
            });

            const botComment = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('PR Preview')
            );

            const body = `## PR Preview\n\nYour preview is ready!\n\n**URL:** ${previewUrl}\n\n*Built from commit \`${{ github.sha }}\`*`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: repo.owner,
                repo: repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: prNum,
                body,
              });
            }
