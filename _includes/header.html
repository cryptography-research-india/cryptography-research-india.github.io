<header class="site-header" id="site-header">
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="{{ '/' | relative_url }}" class="navbar-brand">
        <span class="brand-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="12" width="12" height="10" rx="2" fill="none" stroke="#00ff88" stroke-width="1.5"/>
            <path d="M10 12V9a4 4 0 0 1 8 0v3" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="14" cy="17" r="1.5" fill="#00ff88"/>
          </svg>
        </span>
        <span class="brand-text">CRI</span>
      </a>

      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>

      <ul class="nav-links" id="nav-links">
        <li>
          <a href="{{ '/' | relative_url }}" class="nav-link{% if page.url == '/' %} active{% endif %}">Home</a>
        </li>
        <li>
          <a href="{{ '/people/' | relative_url }}" class="nav-link{% if page.url contains '/people' %} active{% endif %}">People</a>
        </li>
        <li>
          <a href="{{ '/posts/' | relative_url }}" class="nav-link{% if page.url contains '/posts' or page.layout == 'post' %} active{% endif %}">Posts</a>
        </li>
        <li>
          <a href="{{ '/resources/' | relative_url }}" class="nav-link{% if page.url contains '/resources' %} active{% endif %}">Resources</a>
        </li>
        <li>
          <a href="{{ '/positions/' | relative_url }}" class="nav-link{% if page.url contains '/positions' %} active{% endif %}">Positions</a>
        </li>
        <li>
          <a href="{{ '/about/' | relative_url }}" class="nav-link{% if page.url contains '/about' %} active{% endif %}">About</a>
        </li>
      </ul>
    </div>
  </nav>
</header>
